<!DOCTYPE html>
<html>
    <head>
        <title>Raspberry Pi Gaming</title>
    </head>

    <body>
        <h1>Header</h1>

        <p>Insane tux gaming. It's great, trust me.</p>
    </body>

    <style>
        /* Default dark theme settings */
        :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --accent-color: #007acc;
        --border-color: #333;
        --card-bg: #1e1e1e;
        }

        /* Apply light theme if user prefers it */
        @media (prefers-color-scheme: light) {
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #0055aa;
            --border-color: #ccc;
            --card-bg: #f5f5f5;
        }
        }

        /* Base styles */
        body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.6;
        }

        /* Card or container styling */
        .card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 16px;
        margin: 16px 0;
        }

        /* Links */
        a {
        color: var(--accent-color);
        text-decoration: none;
        }

        a:hover {
        text-decoration: underline;
        }

        /* Typography */
        h1, h2, h3 {
        color: var(--text-color);
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        }

        p {
            margin-bottom: 1em;
        }
    </style>
</html>
